[workspace]
members = [
    "mscore",
    "rustdf",
    "rustms",
    "imspy_connector",
    "imsjl_connector",
    "tims-viewer"
]

resolver = "2"

# HELD-BRANCH DEV OVERRIDE — STRIP BEFORE PUSH. Builds the `sciex` feature against the local
# sciexwiff checkout while its writer commits are held (unpushed). Before pushing: remove this
# stanza AND bump rustdf's sciexwiff `rev` to the pushed writer commit. Absolute path = local only.
[patch."https://github.com/theGreatHerrLebert/sciexwiff"]
sciexwiff = { path = "/home/administrator/thermo-raw-spike/sciexwiff" }

[profile.release]
debug = true
overflow-checks = true
lto = "thin"
panic = "abort"
